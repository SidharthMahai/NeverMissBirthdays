name: Birthday Reminders

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Apps Script reminder run
        run: |
          RESPONSE=$(curl -fsSL --post301 --post302 --post303 -X POST "$APPS_SCRIPT_URL" \
            -H "Content-Type: application/json" \
            -d "{\"action\":\"reminders_run\",\"cronKey\":\"$APPS_SCRIPT_CRON_KEY\",\"clientKey\":\"$APPS_SCRIPT_CLIENT_KEY\"}")
          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true'
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_CRON_KEY: ${{ secrets.APPS_SCRIPT_CRON_KEY }}
          APPS_SCRIPT_CLIENT_KEY: ${{ secrets.APPS_SCRIPT_CLIENT_KEY }}
