name: Birthday Reminders

on:
  schedule:
    - cron: '30 18 * * *'
  workflow_dispatch:

jobs:
  reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Apps Script reminder run
        run: |
          HEADERS_FILE=$(mktemp)
          BODY_FILE=$(mktemp)
          PAYLOAD="{\"action\":\"reminders_run\",\"cronKey\":\"$APPS_SCRIPT_CRON_KEY\",\"clientKey\":\"$APPS_SCRIPT_CLIENT_KEY\"}"

          curl -sS -D "$HEADERS_FILE" -o "$BODY_FILE" -X POST "$APPS_SCRIPT_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

          STATUS=$(head -n 1 "$HEADERS_FILE" | sed -E 's/HTTP\\/[^ ]+ ([0-9]+).*/\\1/')
          if [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ] || [ "$STATUS" = "303" ] || [ "$STATUS" = "307" ] || [ "$STATUS" = "308" ]; then
            LOCATION=$(grep -i '^location:' "$HEADERS_FILE" | tail -1 | sed -E 's/[Ll]ocation:[[:space:]]*//' | tr -d '\r')
            RESPONSE=$(curl -fsSL "$LOCATION")
          elif [ "$STATUS" = "200" ]; then
            RESPONSE=$(cat "$BODY_FILE")
          else
            echo "Unexpected HTTP status from Apps Script: $STATUS"
            cat "$BODY_FILE"
            exit 1
          fi

          echo "$RESPONSE"
          echo "$RESPONSE" | grep -q '"ok":true'
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          APPS_SCRIPT_CRON_KEY: ${{ secrets.APPS_SCRIPT_CRON_KEY }}
          APPS_SCRIPT_CLIENT_KEY: ${{ secrets.APPS_SCRIPT_CLIENT_KEY }}
